<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Füttere das Schweinchen! 🐷</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#5BBF7A; --green-dark:#3D9E5F; --green-light:#E8F7EE;
    --blue:#4AACDB; --blue-dark:#2A85B0;
    --yellow:#FFD166; --orange:#FF9A3C; --pink:#FF6B9D; --purple:#9B7FE8;
    --bg:#F0FAF5; --text:#2D3748; --text-light:#718096;
    --surface:#FDFCFA; --surface2:#EEF5EF; --border:#E8F7EE;
    --radius:20px; --shadow:0 6px 24px rgba(61,158,95,0.12);
  }
  body.dark {
    --bg:#0F1A14; --text:#E8F5EE; --text-light:#8FBFA0;
    --surface:#1A2E20; --surface2:#1E3525; --border:#2A4A35;
    --shadow:0 6px 24px rgba(0,0,0,0.4);
  }
  body.dark .header        { background:linear-gradient(135deg,#2A0D18,#3A1A28); border-bottom-color:#5A2A3A; }
  body.dark .goal-card     { border-color:#5A2A3A; }
  body.dark .progress-wrap { background:#3A1A28; }
  body.dark .pig-drop-zone { background:linear-gradient(135deg,#2A1520,#351A25); border-color:#5A2A3A; }
  body.dark .pig-drop-zone.drag-over { background:linear-gradient(135deg,#3A1A28,#451A30); }
  body.dark .coin-item:hover  { background:#2A2810; border-color:#B8960A; }
  body.dark .total-strip  { background:linear-gradient(135deg,#1A1A08,#252510); border-color:#8B7020; }
  body.dark .close-btn    { background:rgba(0,0,0,0.4); }

  *    { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* CLOSE */
  .close-btn { position:absolute; top:16px; right:16px; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:2px solid rgba(255,107,157,0.4); color:var(--pink); font-size:20px; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; text-decoration:none; transition:all 0.2s; z-index:10; }
  .close-btn:hover { background:rgba(255,107,157,0.2); transform:scale(1.1); }

  /* BACK */
  .back-btn { display:flex; align-items:center; gap:8px; background:linear-gradient(135deg,var(--green),var(--blue)); color:white; border:none; font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; padding:14px 28px; border-radius:50px; cursor:pointer; text-decoration:none; box-shadow:0 6px 20px rgba(91,191,122,0.4); transition:all 0.2s; margin:24px auto 32px; width:fit-content; }
  .back-btn:hover { transform:translateY(-2px); }

  /* HEADER */
  .header { text-align:center; padding:16px 20px 12px; background:linear-gradient(135deg,#FFF0F5,#FFE4EE); border-bottom:2px solid #FFB3CC; position:relative; overflow:hidden; }
  .floating-coins { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; }
  .float-coin { position:absolute; animation:floatCoin 4s ease-in-out infinite; opacity:0.5; }
  .float-coin img { width:30px; height:30px; object-fit:contain; }
  .float-coin:nth-child(1) { left:5%;  top:20%; animation-delay:0s; }
  .float-coin:nth-child(2) { left:15%; top:55%; animation-delay:0.7s; }
  .float-coin:nth-child(3) { left:80%; top:15%; animation-delay:1.4s; }
  .float-coin:nth-child(4) { left:90%; top:55%; animation-delay:2.1s; }
  .float-coin:nth-child(5) { left:50%; top:8%;  animation-delay:0.3s; }
  @keyframes floatCoin { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-14px) rotate(12deg)} }
  .header-title { font-family:'Fredoka One',cursive; font-size:clamp(24px,6vw,42px); background:linear-gradient(135deg,var(--pink),var(--orange)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; position:relative; z-index:1; }
  .header-sub { color:var(--text-light); font-size:14px; font-weight:600; position:relative; z-index:1; }

  /* CONTAINER */
  .game-container { max-width:700px; margin:0 auto; padding:12px 16px 24px; }

  /* GOAL CARD */
  .goal-card { background:var(--surface); border-radius:var(--radius); padding:14px 18px; box-shadow:var(--shadow); border:2px solid #FFB3CC; margin-bottom:12px; text-align:center; position:relative; overflow:hidden; }
  .goal-card::before { content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px; background:radial-gradient(circle,#FFD166 0%,transparent 70%); opacity:0.3; }
  .goal-label { font-size:12px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .goal-text  { font-family:'Fredoka One',cursive; font-size:clamp(18px,4vw,26px); color:var(--text); margin-bottom:10px; }
  .goal-text span { color:var(--pink); }
  .progress-wrap { background:#FFE4EE; border-radius:100px; height:18px; overflow:hidden; margin-bottom:6px; }
  .progress-bar  { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--pink),var(--orange)); transition:width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .progress-text { display:flex; justify-content:space-between; font-size:13px; font-weight:700; color:var(--text-light); }
  .current-amount { color:var(--pink) !important; font-size:15px; }

  /* CARRY BADGE */
  .carry-badge { display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg,#FFF9E0,#FFF3CC); border:2px solid var(--yellow); border-radius:50px; padding:4px 14px; font-size:12px; font-weight:800; color:#8B6200; margin-top:8px; }
  body.dark .carry-badge { background:linear-gradient(135deg,#221A08,#2C2210); border-color:#8B7020; color:var(--yellow); }

  /* PIG */
  .pig-zone-wrap  { display:flex; justify-content:center; margin-bottom:10px; }
  .pig-drop-zone  { width:140px; height:140px; border-radius:50%; background:linear-gradient(135deg,#FFF0F5,#FFE4EE); border:4px dashed #FFB3CC; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s ease; position:relative; user-select:none; }
  .pig-drop-zone.drag-over { border-color:var(--pink); background:linear-gradient(135deg,#FFE0EE,#FFD0E4); transform:scale(1.08); box-shadow:0 0 0 8px rgba(255,107,157,0.2); }
  .pig-drop-zone.bounce    { animation:pigBounce 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pigBounce { 0%{transform:scale(1)} 40%{transform:scale(0.88)} 100%{transform:scale(1)} }
  .pig-img { width:100px; height:100px; object-fit:contain; animation:pigWiggle 3s ease-in-out infinite; }
  @keyframes pigWiggle { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
  .pig-drop-zone:hover .pig-img { transform:scale(1.08) rotate(0deg); }

  /* MOOD */
  .mood-message { text-align:center; font-family:'Fredoka One',cursive; font-size:17px; color:var(--pink); min-height:24px; margin-bottom:8px; transition:all 0.3s; }

  /* TOTAL STRIP */
  .total-strip { display:flex; align-items:center; justify-content:center; gap:12px; background:linear-gradient(135deg,#FFF9E0,#FFFBEA); border:2px solid var(--yellow); border-radius:100px; padding:8px 24px; margin-bottom:10px; }
  .total-strip-label  { font-size:14px; font-weight:700; color:var(--text-light); }
  .total-strip-amount { font-family:'Fredoka One',cursive; font-size:20px; color:var(--orange); }

  /* COIN TRAY */
  .coin-tray-label { font-size:12px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:1px; text-align:center; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .coin-tray { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; background:var(--surface); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); border:2px solid var(--border); margin-bottom:12px; min-height:90px; align-items:center; position:relative; overflow:visible; }

  /* COIN ITEMS */
  .coin-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:8px 10px; border-radius:14px; border:2px solid var(--border); background:var(--bg); transition:all 0.2s ease; user-select:none; touch-action:none; -webkit-user-drag:none; }
  .coin-item:hover { transform:translateY(-4px) scale(1.06); border-color:var(--yellow); background:#FFFBEA; box-shadow:0 6px 16px rgba(255,209,102,0.3); }
  .coin-visual { width:48px; height:48px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(0,0,0,0.18); }
  .coin-visual img { width:100%; height:100%; object-fit:cover; pointer-events:none; border-radius:50%; }
  .coin-label { font-size:11px; font-weight:800; color:var(--text-light); }

  /* RESET BTN */
  .btn-reset { display:block; margin:24px auto 0; padding:12px 32px; border-radius:100px; border:none; background:linear-gradient(135deg,var(--green),var(--blue)); color:white; font-family:'Fredoka One',cursive; font-size:17px; cursor:pointer; transition:all 0.3s ease; box-shadow:0 4px 16px rgba(91,191,122,0.35); }
  .btn-reset:hover { transform:translateY(-2px) scale(1.04); }

  /* CELEBRATION */
  .celebration-overlay { position:fixed; inset:0; background:rgba(255,107,157,0.15); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.3s ease; padding:20px; }
  .celebration-overlay.show { opacity:1; pointer-events:all; }
  .celebration-card { background:var(--surface); border-radius:28px; padding:32px 36px; text-align:center; box-shadow:0 20px 60px rgba(255,107,157,0.3); border:3px solid #FFB3CC; transform:scale(0.8); transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); max-width:340px; width:100%; }
  .celebration-overlay.show .celebration-card { transform:scale(1); }
  .celebration-pig { width:90px; height:90px; object-fit:contain; display:block; margin:0 auto 12px; animation:celebSpin 0.6s ease-out; }
  @keyframes celebSpin { 0%{transform:scale(0) rotate(-30deg)} 100%{transform:scale(1) rotate(0deg)} }
  .celebration-title { font-family:'Fredoka One',cursive; font-size:30px; color:var(--pink); margin-bottom:6px; }
  .celebration-text  { font-size:15px; color:var(--text-light); font-weight:600; margin-bottom:10px; line-height:1.5; }
  .carry-info { background:linear-gradient(135deg,#FFF9E0,#FFF3CC); border:2px solid var(--yellow); border-radius:14px; padding:10px 16px; margin:0 0 16px; font-size:14px; font-weight:700; color:#8B6200; line-height:1.4; }
  body.dark .carry-info { background:linear-gradient(135deg,#221A08,#2C2210); border-color:#8B7020; color:var(--yellow); }
  .btn-next { padding:14px 32px; border-radius:100px; border:none; background:linear-gradient(135deg,var(--pink),var(--orange)); color:white; font-family:'Fredoka One',cursive; font-size:20px; cursor:pointer; transition:all 0.3s ease; box-shadow:0 4px 16px rgba(255,107,157,0.35); }
  .btn-next:hover { transform:scale(1.05); }

  /* CONFETTI */
  .confetti-piece { position:fixed; border-radius:2px; pointer-events:none; z-index:200; animation:confettiFall 1.8s ease-in forwards; }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  @keyframes coinPop { 0%{transform:scale(1.5) translateY(0);opacity:1} 100%{transform:scale(0.3) translateY(-70px);opacity:0} }

  /* NEUE MÜNZEN OVERLAY */
  .refill-overlay { position:absolute; inset:0; background:rgba(255,240,245,0.97); border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; z-index:10; animation:fadeIn 0.3s ease; padding:6px 8px; }
  body.dark .refill-overlay { background:rgba(30,53,37,0.97); }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .refill-emoji { font-size:32px; animation:refillBounce 0.8s ease-in-out infinite; }
  @keyframes refillBounce { 0%,100%{transform:rotate(-15deg)} 25%{transform:rotate(15deg)} 50%{transform:rotate(-10deg)} 75%{transform:rotate(10deg)} }
  .refill-text { font-family:'Fredoka One',cursive; font-size:15px; color:var(--pink); text-align:center; }
  .refill-dots span { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--pink); margin:0 2px; animation:dotBounce 0.8s ease-in-out infinite; }
  .refill-dots span:nth-child(2) { animation-delay:0.15s; background:var(--orange); }
  .refill-dots span:nth-child(3) { animation-delay:0.30s; background:var(--yellow); }
  @keyframes dotBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  /* DRAG GHOST */
  .drag-ghost { position:fixed; pointer-events:none; z-index:9999; opacity:0.88; transform:translate(-50%,-50%) scale(1.25); transition:none; }

  @media(max-width:480px) {
    .coin-tray   { gap:6px; padding:10px; }
    .coin-item   { padding:6px 8px; }
    .coin-visual { width:40px; height:40px; }
    .pig-drop-zone { width:120px; height:120px; }
    .pig-img { width:86px; height:86px; }
  }
</style>
</head>
<body>

<div class="header">
  <a class="close-btn" id="closeBtn" href="sparschwein.html" title="Zurück">✕</a>
  <div class="floating-coins" id="floatingCoins"></div>
  <h1 class="header-title">Füttere das Schweinchen!</h1>
  <p class="header-sub">Wirf Münzen ins Sparschwein und erreiche dein Ziel!</p>
</div>

<div class="game-container">

  <!-- ZIEL -->
  <div class="goal-card">
    <div class="goal-label">🎯 Dein Sparziel</div>
    <div class="goal-text" id="goalText">Softeis <span>🍦</span> – 1,50 €</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-text">
      <span class="current-amount" id="currentAmount">0,00 €</span>
      <span id="goalAmount">1,50 €</span>
    </div>
    <div id="carryBadgeWrap" style="display:none">
      <span class="carry-badge">🐷 Schon gespart: <span id="carryAmountBadge">0,00 €</span></span>
    </div>
  </div>

  <!-- SCHWEIN -->
  <div class="pig-zone-wrap">
    <div class="pig-drop-zone" id="pigDropZone">
      <img class="pig-img" id="pigImg"
        src="https://cdn.jsdelivr.net/gh/KlotzOne/piggyplant@main/public/images/Sparschweinmuenzetranspa.webp"
        alt="Sparschwein" draggable="false">
    </div>
  </div>

  <div class="mood-message" id="moodMessage">Ich bin noch leer... 😶</div>

  <div class="total-strip">
    <span class="total-strip-label">💰 Gespart:</span>
    <span class="total-strip-amount" id="totalDisplay">0,00 €</span>
    <span class="total-strip-label">von</span>
    <span class="total-strip-amount" id="totalGoalDisplay">1,50 €</span>
  </div>

  <div class="coin-tray-label">
    Ziehe eine Münze ins Sparschwein 👇
  </div>
  <div class="coin-tray" id="coinTray"></div>

  <button class="btn-reset" onclick="resetGame()">🔄 Neues Sparziel</button>
</div>

<!-- FEIER -->
<div class="celebration-overlay" id="celebrationOverlay">
  <div class="celebration-card">
    <img class="celebration-pig"
      src="https://cdn.jsdelivr.net/gh/KlotzOne/piggyplant@main/public/images/Sparscheintransparent.webp"
      alt="Sparschwein">
    <div class="celebration-title" id="celebTitle">Geschafft! 🎉</div>
    <div class="celebration-text"  id="celebText">Du hast genug gespart!</div>
    <div class="carry-info" id="carryInfo" style="display:none"></div>
    <button class="btn-next" onclick="nextGoal()">🐷 Nächstes Ziel!</button>
  </div>
</div>

<script>
const BASE = 'https://cdn.jsdelivr.net/gh/KlotzOne/piggyplant@main/public/images/';

// ── FROM= NAVIGATION ───────────────────────────────────────
(function() {
  const from = new URLSearchParams(window.location.search).get('from');
  const backUrl = (from === 'lernspiele' || from === 'lernspiele-kleine-sparer') ? '../lernspiele/lernspiele-kleine-sparer.html' : 'sparschwein.html';
  document.addEventListener('DOMContentLoaded', () => {
    const closeBtn = document.getElementById('closeBtn');
    if (closeBtn) closeBtn.href = backUrl;
  });
})();

const COIN_FILES  = { 1:'1Cent.webp', 2:'2Cent.webp', 5:'5Cent.webp', 10:'10Cent.webp', 20:'20Cent.webp', 50:'50Cent.webp', 100:'1Euro.webp', 200:'2Euro.webp' };
const COIN_LABELS = { 1:'1 Ct', 2:'2 Ct', 5:'5 Ct', 10:'10 Ct', 20:'20 Ct', 50:'50 Ct', 100:'1 €', 200:'2 €' };

// Gewichtung: Hauptmasse 10–50 Ct, selten 1–5 Ct und 1 €, sehr selten 2 €
const COIN_WEIGHTS = [
  { v:1,   w:4  },
  { v:2,   w:5  },
  { v:5,   w:8  },
  { v:10,  w:22 },
  { v:20,  w:24 },
  { v:50,  w:20 },
  { v:100, w:14 },
  { v:200, w:3  },
];
const W_TOTAL = COIN_WEIGHTS.reduce((s,c) => s+c.w, 0);

function randomCoinVal() {
  let r = Math.random() * W_TOTAL;
  for (const c of COIN_WEIGHTS) { r -= c.w; if (r <= 0) return c.v; }
  return 20;
}

// Alle Sparziele (Cent)
const GOALS = [
  { name:'Kaugummi',         emoji:'🍬', price:50   },
  { name:'Sticker-Pack',     emoji:'⭐', price:100  },
  { name:'Bleistift-Set',    emoji:'✏️', price:120  },
  { name:'Softeis',          emoji:'🍦', price:150  },
  { name:'Lutscher',         emoji:'🍭', price:50   },
  { name:'Radiergummi',      emoji:'🩷', price:80   },
  { name:'Bastelset',        emoji:'🖼️', price:350  },
  { name:'Malbuch',          emoji:'🎨', price:250  },
  { name:'Wasserball',       emoji:'🏐', price:300  },
  { name:'Kinosnacks',       emoji:'🍿', price:300  },
  { name:'Buntstifte',       emoji:'🖍️', price:400  },
  { name:'Jahrmarkt',        emoji:'🎠', price:450  },
  { name:'Kartenspiel',      emoji:'🃏', price:500  },
  { name:'Mini-Puzzle',      emoji:'🧩', price:500  },
  { name:'Wasserpistole',    emoji:'💦', price:500  },
  { name:'Zirkusticket',     emoji:'🎪', price:550  },
  { name:'Schwimmbad',       emoji:'🏊', price:600  },
  { name:'Knetmasse-Set',    emoji:'🟡', price:600  },
  { name:'Wimmelbuch',       emoji:'📚', price:700  },
  { name:'Kuscheltier',      emoji:'🧸', price:700  },
  { name:'Lego-Tüte',        emoji:'🧱', price:800  },
  { name:'Taschenbuch',      emoji:'📖', price:800  },
  { name:'Kinoticket',       emoji:'🎬', price:900  },
  { name:'Brettspiel',       emoji:'🎲', price:1200 },
  { name:'Experimentier-Set',emoji:'🔬', price:1500 },
  { name:'Playmobil-Set',    emoji:'🏰', price:1800 },
  { name:'Rucksack',         emoji:'🎒', price:2000 },
];

// ── STATE ──────────────────────────────────────────────────
let currentCent  = 0;
let carryCent    = 0;
let goalIndex    = 0;
let lastGoalIdx  = -1;
let coins        = [];   // array of cent-values currently in tray
let dragging     = null; // { val, idx }

// ── FORMAT ─────────────────────────────────────────────────
function fmt(c) {
  return Math.floor(c/100) + ',' + (c%100).toString().padStart(2,'0') + ' €';
}

// ── GENERATE COINS ─────────────────────────────────────────
function generateCoins() {
  coins = Array.from({length:8}, () => randomCoinVal());
  renderTray();
}

function renderTray() {
  const tray = document.getElementById('coinTray');
  tray.innerHTML = '';
  dragging = null;

  if (coins.length === 0) {
    tray.innerHTML = '<span style="color:var(--text-light);font-size:13px;font-weight:700;">Münzen werden geladen…</span>';
    setTimeout(generateCoins, 300);
    return;
  }

  coins.forEach((val, idx) => {
    const div = document.createElement('div');
    div.className = 'coin-item';
    div.innerHTML = `
      <div class="coin-visual"><img src="${BASE}${COIN_FILES[val]}" alt="${COIN_LABELS[val]}" draggable="false"></div>
      <div class="coin-label">${COIN_LABELS[val]}</div>`;
    initDrag(div, val, idx);
    tray.appendChild(div);
  });
}

// ── CUSTOM DRAG (sofort, kein Delay) ──────────────────────
function initDrag(el, val, idx) {
  let ghost = null;

  function start(cx, cy) {
    dragging = { val, idx };
    ghost = document.createElement('div');
    ghost.className = 'drag-ghost';
    ghost.innerHTML = `<img src="${BASE}${COIN_FILES[val]}" style="width:58px;height:58px;object-fit:contain;border-radius:50%;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.3));">`;
    ghost.style.left = cx + 'px';
    ghost.style.top  = cy + 'px';
    document.body.appendChild(ghost);
    el.style.opacity = '0.25';
    document.getElementById('pigDropZone').classList.add('drag-over');
  }

  function move(cx, cy) {
    if (!ghost) return;
    ghost.style.left = cx + 'px';
    ghost.style.top  = cy + 'px';
    const r = document.getElementById('pigDropZone').getBoundingClientRect();
    document.getElementById('pigDropZone').classList.toggle('drag-over',
      cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom);
  }

  function end(cx, cy) {
    if (ghost) { ghost.remove(); ghost = null; }
    el.style.opacity = '1';
    document.getElementById('pigDropZone').classList.remove('drag-over');
    const r = document.getElementById('pigDropZone').getBoundingClientRect();
    if (cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom) dropCoin(val, idx);
    dragging = null;
  }

  el.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; start(t.clientX,t.clientY); }, {passive:false});
  el.addEventListener('touchmove',  e => { e.preventDefault(); const t=e.touches[0]; move(t.clientX,t.clientY);  }, {passive:false});
  el.addEventListener('touchend',   e => { e.preventDefault(); const t=e.changedTouches[0]; end(t.clientX,t.clientY); }, {passive:false});

  el.addEventListener('mousedown', e => {
    e.preventDefault();
    start(e.clientX, e.clientY);
    const mm = ev => move(ev.clientX, ev.clientY);
    const mu = ev => { end(ev.clientX, ev.clientY); document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });

  // Tap: auswählen, dann Schwein antippen
  el.addEventListener('click', () => {
    document.querySelectorAll('.coin-item').forEach(c => c.style.boxShadow='');
    el.style.boxShadow = '0 0 0 4px rgba(255,107,157,0.5)';
    dragging = { val, idx };
  });
}

// Schwein: Tap-Ziel
document.getElementById('pigDropZone').addEventListener('click', () => {
  if (dragging) { dropCoin(dragging.val, dragging.idx); dragging = null; }
});

// ── DROP COIN ──────────────────────────────────────────────
function dropCoin(val, idx) {
  coins.splice(idx, 1);
  currentCent += val;

  playSound();
  updateProgress();
  bouncePig();
  spawnParticle(val);
  if (coins.length === 0) {
    showRefillOverlay();
  } else {
    renderTray();
  }

  const goal = GOALS[goalIndex];
  if (currentCent >= goal.price) setTimeout(celebrate, 550);
}

function bouncePig() {
  const z = document.getElementById('pigDropZone');
  z.classList.remove('bounce'); void z.offsetWidth; z.classList.add('bounce');
  setTimeout(() => z.classList.remove('bounce'), 400);
}

// ── PROGRESS ───────────────────────────────────────────────
function updateProgress() {
  const g = GOALS[goalIndex];
  const pct = Math.min(100, (currentCent / g.price) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('currentAmount').textContent = fmt(currentCent);
  document.getElementById('totalDisplay').textContent  = fmt(currentCent);
  const moods = [
    [0,   'Ich bin noch leer... 😶'],
    [1,   'Mmh, ein bisschen... ich habe Hunger! 😐'],
    [30,  'Danke! Das fühlt sich schon besser an! 😊'],
    [60,  'Ohh, fast voll! Weiter so! 😄'],
    [90,  'Noch ein kleines bisschen... 🤩'],
    [100, 'Ich bin voll! Du hast es geschafft! 🎉'],
  ];
  const m = moods.slice().reverse().find(([p]) => pct >= p);
  document.getElementById('moodMessage').textContent = m[1];
}

// ── SOUND ──────────────────────────────────────────────────
function playSound() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime+0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.2);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.2);
  } catch(e) {}
}

// ── APPLAUSE SOUND ────────────────────────────────────────
// ── COIN PARTICLE ──────────────────────────────────────────
function spawnParticle(val) {
  const r = document.getElementById('pigDropZone').getBoundingClientRect();
  const img = document.createElement('img');
  img.src = BASE + COIN_FILES[val];
  img.style.cssText = `position:fixed;width:36px;height:36px;object-fit:contain;border-radius:50%;
    left:${r.left+r.width/2-18}px;top:${r.top+r.height/2-18}px;
    pointer-events:none;z-index:50;animation:coinPop 0.6s ease-out forwards;`;
  document.body.appendChild(img);
  setTimeout(() => img.remove(), 700);
}

// ── REFILL OVERLAY ────────────────────────────────────────
function showRefillOverlay() {
  const tray = document.getElementById('coinTray');
  tray.innerHTML = '';

  const overlay = document.createElement('div');
  overlay.className = 'refill-overlay';
  overlay.innerHTML = `
    <div class="refill-emoji">😑</div>
    <div class="refill-text">Sparen braucht Zeit...</div>
    <div class="refill-dots">
      <span></span><span></span><span></span>
    </div>
  `;
  tray.appendChild(overlay);

  // Nach 3 Sekunden neue Münzen generieren
  setTimeout(() => {
    overlay.style.animation = 'fadeIn 0.3s ease reverse';
    setTimeout(() => generateCoins(), 300);
  }, 3000);
}

// ── CELEBRATE ──────────────────────────────────────────────
function celebrate() {
  const g = GOALS[goalIndex];
  const overflow = currentCent - g.price;
  carryCent = overflow;
  document.getElementById('celebTitle').textContent = 'Geschafft! ' + g.emoji;
  document.getElementById('celebText').textContent  = `Du hast ${fmt(g.price)} für ${g.name} gespart!`;

  const ci = document.getElementById('carryInfo');
  if (overflow > 0) {
    ci.style.display = 'block';
    ci.innerHTML = `🐷 <strong>${fmt(overflow)}</strong> bleiben im Sparschwein – die nimmst du mit zum nächsten Ziel!`;
  } else {
    ci.style.display = 'none';
  }

  document.getElementById('celebrationOverlay').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#FF6B9D','#FFD166','#5BBF7A','#4AACDB','#9B7FE8','#FF9A3C'];
  for (let i=0; i<70; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left   = Math.random()*100 + 'vw';
      p.style.top    = '-20px';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDuration = (1.2+Math.random()*0.8) + 's';
      p.style.animationDelay   = Math.random()*0.5 + 's';
      p.style.width  = (6+Math.random()*10)+'px';
      p.style.height = (6+Math.random()*10)+'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2500);
    }, i*20);
  }
}

// ── NEXT / RESET ───────────────────────────────────────────
function nextGoal() {
  document.getElementById('celebrationOverlay').classList.remove('show');
  currentCent = carryCent;
  carryCent   = 0;
  pickGoal();
}

function resetGame() {
  currentCent = 0; carryCent = 0;
  pickGoal();
}

function pickGoal() {
  let n;
  do { n = Math.floor(Math.random() * GOALS.length); } while (n === lastGoalIdx);
  lastGoalIdx = n; goalIndex = n;

  const g = GOALS[n];
  document.getElementById('goalText').innerHTML      = `${g.name} <span>${g.emoji}</span> – ${fmt(g.price)}`;
  document.getElementById('goalAmount').textContent  = fmt(g.price);
  document.getElementById('totalGoalDisplay').textContent = fmt(g.price);

  // Carry-Badge
  if (currentCent > 0) {
    document.getElementById('carryBadgeWrap').style.display = 'block';
    document.getElementById('carryAmountBadge').textContent = fmt(currentCent);
  } else {
    document.getElementById('carryBadgeWrap').style.display = 'none';
  }

  updateProgress();
  generateCoins();
}

// ── FLOATING HEADER COINS ──────────────────────────────────
function buildFloating() {
  const fc = document.getElementById('floatingCoins');
  [10,50,100,20,5].forEach(v => {
    const s = document.createElement('span');
    s.className = 'float-coin';
    s.innerHTML = `<img src="${BASE}${COIN_FILES[v]}" alt="">`;
    fc.appendChild(s);
  });
}

// ── INIT ───────────────────────────────────────────────────
if (localStorage.getItem('piggyplant-dark') === 'true') document.body.classList.add('dark');
buildFloating();
pickGoal();
</script>
