<html lang="de">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    --yellow: #FFD166;
    --orange: #FF9A3C;
    --pink: #FF6B9D;
    --purple: #9B7FE8;
    --bg: #F0FAF5;
    --text: #2D3748;
    --text-light: #718096;
    --surface: #FDFCFA;
    --surface2: #EEF5EF;
    --border: #E8F7EE;
    --radius: 20px;
    --shadow: 0 6px 24px rgba(61,158,95,0.12);
  }
  body.dark {
    --bg: #0F1A14;
    --text: #E8F5EE;
    --text-light: #8FBFA0;
    --surface: #1A2E20;
    --surface2: #1E3525;
    --border: #2A4A35;
    --shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  body.dark .header { background: linear-gradient(135deg, #0A1F14, #1A3525); border-bottom-color: #2A4A35; }
  body.dark .answer-btn { background: var(--surface2); border-color: var(--border); }
  body.dark .answer-btn:hover:not(:disabled) { background: #1A3528; border-color: var(--green); }
  body.dark .close-btn { background: rgba(0,0,0,0.4); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s; }

  /* CLOSE BTN */
  .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: 2px solid rgba(255,107,157,0.4);
    color: var(--pink);
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: all 0.2s;
    z-index: 10;
    line-height: 1;
  }
  .close-btn:hover { background: rgba(255,107,157,0.2); transform: scale(1.1); }

  /* BACK BTN */
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #3a9b65, #328ea6);
    color: white; border: none; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 15px; padding: 14px 28px;
    border-radius: 50px; cursor: pointer; text-decoration: none;
    box-shadow: 0 6px 20px rgba(50,142,166,0.4);
    transition: all 0.2s; margin: 24px auto 32px; width: fit-content;
  }
  .back-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(50,142,166,0.5); }

  /* HEADER */
  .header {
    text-align: center; padding: 32px 20px 20px;
    background: linear-gradient(135deg, #FFFBEA, #FFF3CC);
    border-bottom: 2px solid #FFE08A;
    position: relative; overflow: hidden;
  }
  .float-coins { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
  .float-coin { position: absolute; animation: floatCoin 4s ease-in-out infinite; opacity: 0.45; font-size: 28px; }
  .float-coin:nth-child(1) { left: 5%;  top: 20%; animation-delay: 0s; }
  .float-coin:nth-child(2) { left: 14%; top: 55%; animation-delay: 0.8s; }
  .float-coin:nth-child(3) { left: 80%; top: 15%; animation-delay: 1.5s; }
  .float-coin:nth-child(4) { left: 88%; top: 55%; animation-delay: 2.2s; }
  .float-coin:nth-child(5) { left: 50%; top: 6%;  animation-delay: 0.4s; }
  @keyframes floatCoin { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-12px) rotate(10deg)} }

  .header-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(26px, 6vw, 44px);
    background: linear-gradient(135deg, #B8860B, #DAA520, #FF9A3C);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 6px; position: relative; z-index: 1;
  }
  .header-sub { color: var(--text-light); font-size: 15px; font-weight: 600; position: relative; z-index: 1; }

  /* SCORE BAR */
  .score-bar {
    display: flex; justify-content: center; gap: 16px; align-items: center;
    padding: 12px 20px; background: var(--surface);
    border-bottom: 2px solid var(--border); flex-wrap: wrap;
  }
  .score-item { font-weight: 800; font-size: 14px; color: var(--text-light); display: flex; align-items: center; gap: 4px; }
  .score-item span { font-family: 'Fredoka One', cursive; font-size: 18px; }
  .score-item.correct span { color: var(--green); }
  .score-item.wrong span { color: var(--pink); }
  .score-item.total span { color: var(--blue); }

  /* PROGRESS */
  .progress-wrap { height: 8px; background: var(--surface2); border-radius: 8px; overflow: hidden; margin: 0 20px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--green), var(--blue)); border-radius: 8px; transition: width 0.5s ease; }

  /* GAME CONTAINER */
  .game-container { max-width: 680px; margin: 0 auto; padding: 24px 16px 40px; }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 28px 24px; box-shadow: var(--shadow);
    border: 2px solid var(--border); margin-bottom: 20px;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .question-num { font-size: 12px; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .imgs-gallery { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin:0 auto 10px; max-width:360px; }
  .imgs-gallery img { width:20px; height:20px; border-radius:50%; object-fit:contain; box-shadow:0 2px 6px rgba(0,0,0,0.12); }
  .question-img {
    width: 100%; max-width: 130px; margin: 0 auto 8px;
    display: block; border-radius: 12px; object-fit: contain;
  }
  .question-text {
    font-family: 'Fredoka One', cursive; font-size: clamp(18px, 4vw, 24px);
    color: var(--text); text-align: center; margin-bottom: 20px; line-height: 1.3;
  }

  /* ANSWERS */
  .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) { .answers { grid-template-columns: 1fr; } }

  .answer-btn {
    background: var(--surface2); border: 2px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
    color: var(--text); cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px; text-align: left;
  }
  .answer-btn:hover:not(:disabled) { background: #E8F7EE; border-color: var(--green); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(91,191,122,0.2); }
  .answer-btn:disabled { cursor: default; }
  .answer-btn.correct { background: linear-gradient(135deg,#E8F7EE,#D0F0DC); border-color: var(--green); color: var(--green-dark); animation: bounceIn 0.4s ease; }
  .answer-btn.wrong { background: linear-gradient(135deg,#FFF0F5,#FFE0EC); border-color: var(--pink); color: #C0204E; }
  .answer-btn.reveal { background: linear-gradient(135deg,#E8F7EE,#D0F0DC); border-color: var(--green); color: var(--green-dark); opacity: 0.7; }
  @keyframes bounceIn { 0%{transform:scale(0.95)} 60%{transform:scale(1.04)} 100%{transform:scale(1)} }

  .answer-icon { display: none; }

  /* FEEDBACK */
  .feedback {
    border-radius: 14px; padding: 14px 18px; margin-top: 14px;
    font-weight: 700; font-size: 15px; display: none; animation: fadeUp 0.3s ease;
  }
  .feedback.correct { background: linear-gradient(135deg,#E8F7EE,#D0F0DC); color: var(--green-dark); border: 2px solid var(--green); }
  .feedback.wrong { background: linear-gradient(135deg,#FFF0F5,#FFE0EC); color: #C0204E; border: 2px solid var(--pink); }

  /* NEXT BTN */
  .next-btn {
    display: none; margin: 16px auto 0; padding: 14px 32px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    color: white; border: none; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px;
    cursor: pointer; box-shadow: 0 6px 20px rgba(74,172,219,0.4);
    transition: all 0.2s; width: fit-content;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(74,172,219,0.5); }
  .next-btn.show { display: flex; align-items: center; gap: 8px; }

  /* RESULT SCREEN */
  .result-screen {
    display: none; text-align: center;
    background: var(--surface); border-radius: var(--radius);
    padding: 40px 24px; box-shadow: var(--shadow);
    border: 2px solid var(--border); animation: fadeUp 0.5s ease;
  }
  .result-emoji { font-size: 80px; display: block; margin-bottom: 16px; animation: bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .result-title { font-family: 'Fredoka One', cursive; font-size: 32px; margin-bottom: 8px; }
  .result-score { font-family: 'Fredoka One', cursive; font-size: 52px; margin: 16px 0; }
  .result-score .correct { color: var(--green); }
  .result-score .total { color: var(--text-light); font-size: 32px; }
  .result-msg { font-size: 15px; font-weight: 600; color: var(--text-light); margin-bottom: 24px; line-height: 1.5; }
  .result-stars { font-size: 36px; margin: 8px 0 20px; letter-spacing: 4px; }

  .restart-btn {
    display: block;
    margin: 0 auto;
    padding: 14px 36px;
    border-radius: 100px;
    border: none;
    background: linear-gradient(135deg, var(--green), var(--blue));
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(91,191,122,0.35);
  }
  .restart-btn:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 24px rgba(91,191,122,0.45); }

</style>
</head>

    de: { q: 'Welche Farbe hat der 100-Euro-Schein?', answers: ['Blau','Orange','Grün','Grau'], correct: 2 },
    en: { q: 'What colour is the 100 Euro banknote?', answers: ['Blue','Orange','Green','Grey'], correct: 2 },
    img: BASE + '100Euro.webp'
  },
];

let lang = 'de';
let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;

const icons = ['🅰️','🅱️','🅲','🅳'];
const answerIcons = ['','','',''];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  questions = shuffle(allQuestions).slice(0, 10);
  current = 0; correct = 0; wrong = 0; answered = false;
  updateScoreBar();
  document.getElementById('questionCard').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  const data = q[lang];

  document.getElementById('questionNum').textContent =
    lang === 'de' ? `Frage ${current+1} von 10` : `Question ${current+1} of 10`;
  document.getElementById('questionText').textContent = data.q;

  const img = document.getElementById('questionImg');
  // Bildergalerie entfernen falls vorhanden
  const oldGallery = document.getElementById('imgsGallery');
  if (oldGallery) oldGallery.remove();

  if (data.imgs) {
    img.style.display = 'none';
    const gallery = document.createElement('div');
    gallery.id = 'imgsGallery';
    gallery.className = 'imgs-gallery';
    data.imgs.forEach(name => {
      const i = document.createElement('img');
      i.src = BASE + name;
      i.alt = name.replace('.webp','');
      gallery.appendChild(i);
    });
    document.getElementById('questionText').after(gallery);
  } else if (q.img) {
    img.src = q.img;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }

  // Shuffle answers but keep correct index
  const indices = shuffle([0,1,2,3]);
  const correctVal = data.answers[data.correct];
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';

  indices.forEach((origIdx, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="answer-icon">${answerIcons[i]}</span>${data.answers[origIdx]}`;
    const isCorrect = data.answers[origIdx] === correctVal;
    btn.onclick = () => selectAnswer(btn, isCorrect, correctVal, grid);
    grid.appendChild(btn);
  });

  document.getElementById('feedback').style.display = 'none';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressBar').style.width = `${(current / 10) * 100}%`;
}

function selectAnswer(btn, isCorrect, correctVal, grid) {
  if (answered) return;
  answered = true;

  const allBtns = grid.querySelectorAll('.answer-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent.includes(correctVal)) b.classList.add('reveal');
  });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    btn.classList.remove('reveal');
    btn.classList.add('correct');
    correct++;
    fb.className = 'feedback correct';
    fb.textContent = lang === 'de' ? '✅ Super! Das ist richtig!' : '✅ Great! That\'s correct!';
  } else {
    btn.classList.add('wrong');
    wrong++;
    fb.className = 'feedback wrong';
    fb.textContent = lang === 'de'
      ? `❌ Nicht ganz! Richtig wäre: ${correctVal}`
      : `❌ Not quite! The correct answer is: ${correctVal}`;
  }
  fb.style.display = 'block';
  updateScoreBar();

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('show');
  if (current === 9) {
    nextBtn.querySelector('span').textContent = lang === 'de' ? 'Ergebnis sehen' : 'See results';
  } else {
    nextBtn.querySelector('span').textContent = lang === 'de' ? 'Weiter' : 'Next';
  }
}

function nextQuestion() {
  current++;
  if (current >= 10) {
    showResult();
  } else {
    document.getElementById('questionCard').style.animation = 'none';
    setTimeout(() => {
      document.getElementById('questionCard').style.animation = 'fadeUp 0.4s ease';
      showQuestion();
    }, 10);
  }
}

function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.style.display = 'block';
  document.getElementById('progressBar').style.width = '100%';

  document.getElementById('finalScore').textContent = correct;

  let emoji, title, stars, msg;
  if (correct === 10) {
    emoji = '🏆'; stars = '⭐⭐⭐⭐⭐';
    title = lang === 'de' ? 'Perfekt! Du bist ein Experte!' : 'Perfect! You\'re an expert!';
    msg = lang === 'de' ? 'Unglaublich! Alle 10 Fragen richtig – du kennst dich mit Euro-Münzen und Scheinen super aus!' : 'Incredible! All 10 questions correct – you know Euro coins and banknotes really well!';
  } else if (correct >= 8) {
    emoji = '🥇'; stars = '⭐⭐⭐⭐';
    title = lang === 'de' ? 'Sehr gut gemacht!' : 'Very well done!';
    msg = lang === 'de' ? 'Fast perfekt! Du weißt schon sehr viel über Münzen und Scheine.' : 'Almost perfect! You already know a lot about coins and banknotes.';
  } else if (correct >= 6) {
    emoji = '🥈'; stars = '⭐⭐⭐';
    title = lang === 'de' ? 'Gut gemacht!' : 'Well done!';
    msg = lang === 'de' ? 'Du hast mehr als die Hälfte richtig! Noch ein bisschen üben und du schaffst die 10!' : 'You got more than half right! A little more practice and you\'ll get 10!';
  } else if (correct >= 4) {
    emoji = '🥉'; stars = '⭐⭐';
    title = lang === 'de' ? 'Weiter üben!' : 'Keep practising!';
    msg = lang === 'de' ? 'Du lernst noch dazu! Schau dir die Münzen & Scheine Seite nochmal an und versuch es erneut.' : 'You\'re still learning! Check out the coins & banknotes page again and try once more.';
  } else {
    emoji = '🌱'; stars = '⭐';
    title = lang === 'de' ? 'Nicht aufgeben!' : 'Don\'t give up!';
    msg = lang === 'de' ? 'Das war noch schwierig – aber das wird! Lies dir die Infos nochmal durch und probiere es nochmal!' : 'That was still tricky – but you\'ll get there! Read the info again and try once more!';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultMsg').textContent = msg;
}

function updateScoreBar() {
  document.getElementById('scoreCorrect').textContent = correct;
  document.getElementById('scoreWrong').textContent = wrong;
  document.getElementById('scoreTotal').textContent = current;
}

function restartQuiz() {
  startQuiz();
}

function toggleDark() {
  document.body.classList.toggle('dark');
  localStorage.setItem('piggyplant-dark', document.body.classList.contains('dark'));
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('[data-de]').forEach(el => {
    el.textContent = l === 'de' ? el.dataset.de : el.dataset.en;
  });
}

// Init
window.onload = () => {
  if (localStorage.getItem('piggyplant-dark') === 'true') document.body.classList.add('dark');
  startQuiz();
};
</script>
</body>
</html>
