<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Münzen Rechnen 🧮</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #5BBF7A;
    --green-dark: #3D9E5F;
    --blue: #4AACDB;
    --blue-dark: #2A85B0;
    --yellow: #FFD166;
    --orange: #FF9A3C;
    --pink: #FF6B9D;
    --purple: #9B7FE8;
    --bg: #F0FAF5;
    --text: #2D3748;
    --text-light: #718096;
    --surface: #FDFCFA;
    --surface2: #EEF5EF;
    --border: #E8F7EE;
    --radius: 20px;
    --shadow: 0 6px 24px rgba(61,158,95,0.12);
  }
  body.dark {
    --bg: #0F1A14;
    --text: #E8F5EE;
    --text-light: #8FBFA0;
    --surface: #1A2E20;
    --surface2: #1E3525;
    --border: #2A4A35;
    --shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  body.dark .header { background: linear-gradient(135deg, #0A1F14, #1A3525); border-bottom-color: #2A4A35; }
  body.dark .close-btn { background: rgba(0,0,0,0.4); }
  body.dark .option-btn { background: var(--surface2); border-color: var(--border); }
  body.dark .option-btn:hover:not(:disabled) { background: #1A3528; border-color: var(--green); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s; }

  /* CLOSE BTN */
  .close-btn {
    position: absolute; top: 16px; right: 16px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: 2px solid rgba(255,107,157,0.4);
    color: var(--pink); font-size: 20px; font-weight: 900;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; text-decoration: none;
    transition: all 0.2s; z-index: 10; line-height: 1;
  }
  .close-btn:hover { background: rgba(255,107,157,0.2); transform: scale(1.1); }

  /* BACK BTN */
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #3a9b65, #328ea6);
    color: white; border: none; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 15px; padding: 14px 28px;
    border-radius: 50px; cursor: pointer; text-decoration: none;
    box-shadow: 0 6px 20px rgba(50,142,166,0.4);
    transition: all 0.2s; margin: 24px auto 32px; width: fit-content;
  }
  .back-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(50,142,166,0.5); }

  /* HEADER */
  .header {
    text-align: center; padding: 32px 20px 20px;
    background: linear-gradient(135deg, #FFFBEA, #FFF3CC);
    border-bottom: 2px solid #FFE08A;
    position: relative; overflow: hidden;
  }
  .float-coins { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
  .float-coin { position: absolute; animation: floatCoin 4s ease-in-out infinite; opacity: 0.45; font-size: 28px; }
  .float-coin:nth-child(1) { left: 5%;  top: 20%; animation-delay: 0s; }
  .float-coin:nth-child(2) { left: 14%; top: 55%; animation-delay: 0.8s; }
  .float-coin:nth-child(3) { left: 80%; top: 15%; animation-delay: 1.5s; }
  .float-coin:nth-child(4) { left: 88%; top: 55%; animation-delay: 2.2s; }
  .float-coin:nth-child(5) { left: 50%; top: 6%;  animation-delay: 0.4s; }
  @keyframes floatCoin { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-12px) rotate(10deg)} }

  .header-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(26px, 6vw, 44px);
    background: linear-gradient(135deg, #B8860B, #DAA520, #FF9A3C);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 6px; position: relative; z-index: 1;
  }
  .header-sub { color: var(--text-light); font-size: 15px; font-weight: 600; position: relative; z-index: 1; }

  /* SCORE BAR */
  .score-bar {
    display: flex; justify-content: center; gap: 16px; align-items: center;
    padding: 12px 20px; background: var(--surface);
    border-bottom: 2px solid var(--border); flex-wrap: wrap;
  }
  .score-item { font-weight: 800; font-size: 14px; color: var(--text-light); display: flex; align-items: center; gap: 4px; }
  .score-item span { font-family: 'Fredoka One', cursive; font-size: 18px; }
  .score-item.correct span { color: var(--green); }
  .score-item.wrong span { color: var(--pink); }
  .score-item.total span { color: var(--blue); }

  /* PROGRESS */
  .progress-wrap { height: 8px; background: var(--surface2); border-radius: 8px; overflow: hidden; margin: 0 20px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--green), var(--blue)); border-radius: 8px; transition: width 0.5s ease; }

  /* GAME CONTAINER */
  .game-container { max-width: 680px; margin: 0 auto; padding: 24px 16px 40px; }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 28px 24px; box-shadow: var(--shadow);
    border: 2px solid var(--border); margin-bottom: 20px;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes bounceIn { 0%{transform:scale(0.95)} 60%{transform:scale(1.04)} 100%{transform:scale(1)} }

  .question-num { font-size: 12px; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; text-align: center; }

  .question-text {
    font-family: 'Fredoka One', cursive; font-size: clamp(18px, 4vw, 22px);
    color: var(--text); text-align: center; margin-bottom: 20px; line-height: 1.3;
  }

  /* COINS DISPLAY */
  .coins-display {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; align-items: center;
    background: linear-gradient(135deg, #FFFBEA, #FFF3CC);
    border: 2px solid #FFE08A; border-radius: 16px;
    padding: 18px 16px; margin-bottom: 24px;
    min-height: 90px;
  }
  body.dark .coins-display { background: linear-gradient(135deg, #221A08, #2C2210); border-color: #8B7020; }

  .coin-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    animation: bounceIn 0.4s ease;
  }
  .coin-item img { width: 72px; height: 72px; object-fit: contain; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15)); }
  .coin-item .coin-label { font-family: 'Fredoka One', cursive; font-size: 13px; color: #8B6200; }
  body.dark .coin-item .coin-label { color: var(--yellow); }

  /* ANSWERS */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 400px) { .options { grid-template-columns: 1fr; } }

  .option-btn {
    background: var(--surface2); border: 2px solid var(--border);
    border-radius: 14px; padding: 16px;
    font-family: 'Fredoka One', cursive; font-size: 20px;
    color: var(--text); cursor: pointer; transition: all 0.2s;
    text-align: center;
  }
  .option-btn:hover:not(:disabled) { background: #E8F7EE; border-color: var(--green); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(91,191,122,0.2); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { background: linear-gradient(135deg,#E8F7EE,#D0F0DC); border-color: var(--green); color: var(--green-dark); animation: bounceIn 0.4s ease; }
  .option-btn.wrong { background: linear-gradient(135deg,#FFF0F5,#FFE0EC); border-color: var(--pink); color: #C0204E; }
  .option-btn.reveal { background: linear-gradient(135deg,#E8F7EE,#D0F0DC); border-color: var(--green); color: var(--green-dark); opacity: 0.7; }

  /* FEEDBACK */
  .feedback {
    border-radius: 14px; padding: 14px 18px; margin-top: 14px;
    font-weight: 700; font-size: 15px; display: none; animation: fadeUp 0.3s ease;
  }
  .feedback.correct { background: linear-gradient(135deg,#E8F7EE,#D0F0DC); color: var(--green-dark); border: 2px solid var(--green); display: block; }
  .feedback.wrong { background: linear-gradient(135deg,#FFF0F5,#FFE0EC); color: #C0204E; border: 2px solid var(--pink); display: block; }

  /* NEXT BTN */
  .next-btn {
    display: none; margin: 16px auto 0; padding: 14px 32px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    color: white; border: none; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px;
    cursor: pointer; box-shadow: 0 6px 20px rgba(74,172,219,0.4);
    transition: all 0.2s; width: fit-content;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(74,172,219,0.5); }
  .next-btn.show { display: flex; align-items: center; gap: 8px; }

  /* RESULT SCREEN */
  .result-screen {
    display: none; text-align: center;
    background: var(--surface); border-radius: var(--radius);
    padding: 40px 24px; box-shadow: var(--shadow);
    border: 2px solid var(--border); animation: fadeUp 0.5s ease;
  }
  .result-emoji { font-size: 80px; display: block; margin-bottom: 16px; animation: bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .result-title { font-family: 'Fredoka One', cursive; font-size: 32px; margin-bottom: 8px; }
  .result-score { font-family: 'Fredoka One', cursive; font-size: 52px; margin: 16px 0; }
  .result-score .correct { color: var(--green); }
  .result-score .total { color: var(--text-light); font-size: 32px; }
  .result-msg { font-size: 15px; font-weight: 600; color: var(--text-light); margin-bottom: 24px; line-height: 1.5; }
  .result-stars { font-size: 36px; margin: 8px 0 20px; letter-spacing: 4px; }

  .restart-btn {
    display: block; margin: 0 auto; padding: 14px 36px;
    border-radius: 100px; border: none;
    background: linear-gradient(135deg, var(--green), var(--blue));
    color: white; font-family: 'Fredoka One', cursive;
    font-size: 18px; cursor: pointer; transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(91,191,122,0.35);
  }
  .restart-btn:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 24px rgba(91,191,122,0.45); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="float-coins">
    <span class="float-coin">🪙</span>
    <span class="float-coin">💰</span>
    <span class="float-coin">🧮</span>
    <span class="float-coin">⭐</span>
    <span class="float-coin">🪙</span>
  </div>
  <a class="close-btn" id="closeBtn" href="muenzen.html" title="Schließen">✕</a>
  <div class="header-title" data-de="Münzen Rechnen" data-en="Counting Coins">Münzen Rechnen</div>
  <div class="header-sub" data-de="Wie viel sind diese Münzen zusammen?" data-en="How much are these coins together?">Wie viel sind diese Münzen zusammen?</div>
</div>

<!-- SCORE BAR -->
<div class="score-bar">
  <div class="score-item correct">✅ <span id="scoreCorrect">0</span> <span data-de="Richtig" data-en="Correct">Richtig</span></div>
  <div class="score-item wrong">❌ <span id="scoreWrong">0</span> <span data-de="Falsch" data-en="Wrong">Falsch</span></div>
  <div class="score-item total">🎯 <span id="scoreTotal">0</span>/10</div>
</div>
<div style="padding: 8px 20px 0;">
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>

<!-- GAME -->
<div class="game-container">
  <div class="question-card" id="questionCard">
    <div class="question-num" id="questionNum">Frage 1 von 10</div>
    <div class="question-text" id="questionText"></div>
    <div class="coins-display" id="coinsDisplay"></div>
    <div class="options" id="optionsGrid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      <span id="nextBtnText">Weiter →</span>
    </button>
  </div>

  <div class="result-screen" id="resultScreen">
    <span class="result-emoji" id="resultEmoji"></span>
    <div class="result-stars" id="resultStars"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score"><span class="correct" id="resultCorrect"></span><span class="total">/10</span></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="restart-btn" onclick="restartGame()">🔄 <span data-de="Neues Spiel" data-en="New game">Neues Spiel</span></button>
  </div>

  <a class="back-btn" id="backBtn" href="muenzen.html">← <span data-de="Zurück zur Übersicht" data-en="Back to overview">Zurück zur Übersicht</span></a>
</div>

<script>
const BASE = 'https://cdn.jsdelivr.net/gh/KlotzOne/piggyplant@main/public/images/';

// ── FROM= NAVIGATION ───────────────────────────────────────
(function() {
  const from = new URLSearchParams(window.location.search).get('from');
  const backUrl = from === 'lernspiele' ? 'lernspiele.html' : 'muenzen.html';
  const backLabel = from === 'lernspiele' ? '← Zurück zu Lernspiele' : '← Zurück zur Übersicht';
  document.addEventListener('DOMContentLoaded', () => {
    const closeBtn = document.getElementById('closeBtn');
    const backBtn = document.getElementById('backBtn');
    if (closeBtn) closeBtn.href = backUrl;
    if (backBtn) { backBtn.href = backUrl; backBtn.querySelector('span').textContent = backLabel; }
  });
})();
const COINS = [
  { file: '1Cent.webp',   value: 1,   label: '1ct' },
  { file: '2Cent.webp',   value: 2,   label: '2ct' },
  { file: '5Cent.webp',   value: 5,   label: '5ct' },
  { file: '10Cent.webp',  value: 10,  label: '10ct' },
  { file: '20Cent.webp',  value: 20,  label: '20ct' },
  { file: '50Cent.webp',  value: 50,  label: '50ct' },
  { file: '1Euro.webp',   value: 100, label: '1 €' },
  { file: '2Euro.webp',   value: 200, label: '2 €' },
];

// Schwierigkeitsstufen
const LEVELS = [
  { count: 2, pool: [0,1,2,3] },       // Fragen 1-3: nur kleine Münzen, 2 Münzen
  { count: 3, pool: [0,1,2,3,4] },     // Fragen 4-6: etwas mehr
  { count: 3, pool: [2,3,4,5,6,7] },   // Fragen 7-8: größere Münzen
  { count: 4, pool: [0,1,2,3,4,5,6,7] }, // Fragen 9-10: alles gemischt
];

let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;
let answered = false;
const lang = localStorage.getItem('lang') || 'de';

// Dunkelmodus
if (localStorage.getItem('piggyplant-dark') === 'true') document.body.classList.add('dark');

function formatCent(cent) {
  if (cent < 100) return cent + ' Cent';
  if (cent % 100 === 0) return (cent / 100) + ' €';
  return (cent / 100).toFixed(2).replace('.', ',') + ' €';
}

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function getLevelForQuestion(idx) {
  if (idx < 3) return LEVELS[0];
  if (idx < 6) return LEVELS[1];
  if (idx < 8) return LEVELS[2];
  return LEVELS[3];
}

function generateQuestion(idx) {
  const level = getLevelForQuestion(idx);
  const poolCoins = level.pool.map(i => COINS[i]);

  // Zufällige Münzen auswählen (können sich wiederholen für Realismus)
  const selected = [];
  for (let i = 0; i < level.count; i++) {
    selected.push(poolCoins[Math.floor(Math.random() * poolCoins.length)]);
  }

  const totalCent = selected.reduce((sum, c) => sum + c.value, 0);

  // 3 falsche Antworten generieren (nahe am richtigen Wert)
  const wrongAnswers = new Set();
  const attempts = ['plus', 'minus', 'random'];
  while (wrongAnswers.size < 3) {
    const r = Math.random();
    let val;
    if (r < 0.33) val = totalCent + selected[Math.floor(Math.random() * selected.length)].value;
    else if (r < 0.66) val = Math.max(1, totalCent - selected[Math.floor(Math.random() * selected.length)].value);
    else val = totalCent + (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1) * 
               poolCoins[Math.floor(Math.random() * poolCoins.length)].value;
    if (val > 0 && val !== totalCent && !wrongAnswers.has(val)) wrongAnswers.add(val);
  }

  const allAnswers = shuffle([totalCent, ...[...wrongAnswers]]);
  return {
    coins: selected,
    total: totalCent,
    answers: allAnswers,
    correct: allAnswers.indexOf(totalCent)
  };
}

function buildQuestions() {
  questions = [];
  for (let i = 0; i < 10; i++) questions.push(generateQuestion(i));
}

function showQuestion() {
  answered = false;
  const q = questions[current];

  document.getElementById('questionNum').textContent =
    lang === 'de' ? `Frage ${current+1} von 10` : `Question ${current+1} of 10`;
  document.getElementById('questionText').textContent =
    lang === 'de' ? 'Wie viel sind diese Münzen zusammen?' : 'How much are these coins together?';

  // Münzen anzeigen
  const display = document.getElementById('coinsDisplay');
  display.innerHTML = '';
  q.coins.forEach((coin, i) => {
    if (i > 0) {
      const plus = document.createElement('span');
      plus.textContent = '+';
      plus.style.cssText = 'font-family:"Fredoka One",cursive;font-size:28px;color:#B8860B;align-self:center;';
      display.appendChild(plus);
    }
    const item = document.createElement('div');
    item.className = 'coin-item';
    item.style.animationDelay = (i * 0.08) + 's';
    item.innerHTML = `<img src="${BASE}${coin.file}" alt="${coin.label}"><span class="coin-label">${coin.label}</span>`;
    display.appendChild(item);
  });

  // Antwortoptionen
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = formatCent(ans);
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  // Feedback & Next zurücksetzen
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn';
  document.getElementById('nextBtnText').textContent =
    current === 9 ? (lang === 'de' ? 'Ergebnis sehen 🏆' : 'See result 🏆') : (lang === 'de' ? 'Weiter →' : 'Next →');

  document.getElementById('progressBar').style.width = (current / 10 * 100) + '%';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');

  if (idx === q.correct) {
    btns[idx].classList.add('correct');
    correct++;
    document.getElementById('scoreCorrect').textContent = correct;
    fb.className = 'feedback correct';
    fb.textContent = lang === 'de' ? '✅ Richtig! Super gerechnet!' : '✅ Correct! Well done!';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('reveal');
    wrong++;
    document.getElementById('scoreWrong').textContent = wrong;
    fb.className = 'feedback wrong';
    fb.textContent = lang === 'de'
      ? `❌ Nicht ganz! Die richtige Antwort war ${formatCent(q.answers[q.correct])}.`
      : `❌ Not quite! The correct answer was ${formatCent(q.answers[q.correct])}.`;
  }
  document.getElementById('scoreTotal').textContent = current + 1;
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= 10) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.style.display = 'block';
  document.getElementById('progressBar').style.width = '100%';

  document.getElementById('resultCorrect').textContent = correct;

  let emoji, stars, title, msg;
  if (correct === 10) {
    emoji = '🏆'; stars = '⭐⭐⭐⭐⭐';
    title = lang === 'de' ? 'Perfekt!' : 'Perfect!';
    msg = lang === 'de' ? 'Du bist ein Rechen-Genie! Alle Münzen richtig gezählt!' : 'You\'re a maths genius! All coins counted correctly!';
  } else if (correct >= 8) {
    emoji = '🥇'; stars = '⭐⭐⭐⭐';
    title = lang === 'de' ? 'Sehr gut!' : 'Very good!';
    msg = lang === 'de' ? 'Fast perfekt! Du kannst super mit Münzen rechnen!' : 'Almost perfect! You\'re great at counting coins!';
  } else if (correct >= 6) {
    emoji = '🥈'; stars = '⭐⭐⭐';
    title = lang === 'de' ? 'Gut gemacht!' : 'Well done!';
    msg = lang === 'de' ? 'Schon ziemlich gut! Noch ein bisschen üben und du schaffst es!' : 'Pretty good! A little more practice and you\'ll get it!';
  } else if (correct >= 4) {
    emoji = '🥉'; stars = '⭐⭐';
    title = lang === 'de' ? 'Weiter üben!' : 'Keep practising!';
    msg = lang === 'de' ? 'Du lernst es! Zähl die Münzen nochmal langsam zusammen.' : 'You\'re learning! Try counting the coins slowly again.';
  } else {
    emoji = '🌱'; stars = '⭐';
    title = lang === 'de' ? 'Nicht aufgeben!' : 'Don\'t give up!';
    msg = lang === 'de' ? 'Üben macht den Meister! Versuch es nochmal.' : 'Practice makes perfect! Try again.';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
}

function restartGame() {
  current = 0; correct = 0; wrong = 0;
  document.getElementById('scoreCorrect').textContent = '0';
  document.getElementById('scoreWrong').textContent = '0';
  document.getElementById('scoreTotal').textContent = '0';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('questionCard').style.display = 'block';
  buildQuestions();
  showQuestion();
}

// Start
buildQuestions();
showQuestion();
</script>
</body>
</html>
